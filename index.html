<!DOCTYPE html>
<html>
<head>
	<title>Redirect to WhatsApp</title>
</head>
<body>

	<p>Silakan klik tombol di bawah untuk terhubung ke WhatsApp:</p>

	<!-- Mengarahkan ke aplikasi WhatsApp menggunakan URL scheme -->
	<a href="whatsapp://send?phone=6285807149213">Hubungi via WhatsApp</a>

	<!-- Fallback jika aplikasi WhatsApp tidak terinstall -->
	<a href="https://api.whatsapp.com/send?phone=6285807149213">Hubungi via WhatsApp (Web)</a>

</body>
</html>
